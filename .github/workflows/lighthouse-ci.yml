name: Lighthouse CI (Performance Audit)

on:
  push:
    branches: [ main, develop, feature/*, claude/* ]
  pull_request:
    branches: [ main, develop ]
  schedule:
    - cron: '0 4 * * *'  # 04:00 UTC daily

jobs:
  lighthouse:
    runs-on: ubuntu-latest
    permissions:
      checks: write
      pull-requests: write
      contents: read

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'npm'

      - name: Install dependencies
        run: npm install --prefer-offline --no-audit

      - name: Start local server
        run: |
          npx http-server -p 8000 -c-1 &
          sleep 2
          curl http://localhost:8000 || true

      - name: Run Lighthouse CI
        uses: treosh/lighthouse-ci-action@v10
        with:
          configPath: './.github/lighthouse-ci-config.json'
          temporaryPublicStorage: true
          uploadArtifacts: true

      - name: Upload Lighthouse reports
        if: always()
        uses: actions/upload-artifact@v3
        with:
          name: lighthouse-reports
          path: .lighthouseci/
          retention-days: 30

      - name: Comment PR with Lighthouse results
        if: github.event_name == 'pull_request' && always()
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const path = require('path');
            const resultsDir = '.lighthouseci/lhr-*.json';

            const comment = `## 🔦 Lighthouse CI Results

**Performance Audit Summary:**

| Metric | Score |
|--------|-------|
| Performance | 🟡 In Progress |
| Accessibility | 🟡 In Progress |
| Best Practices | 🟡 In Progress |
| SEO | 🟡 In Progress |

[📊 View Full Report](https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }})`;

            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: comment
            });
