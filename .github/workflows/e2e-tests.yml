name: E2E Tests (Playwright)

on:
  push:
    branches: [ main, develop, feature/*, claude/* ]
  pull_request:
    branches: [ main, develop ]
  schedule:
    - cron: '0 6 * * *'  # 06:00 UTC daily

jobs:
  test:
    timeout-minutes: 30
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        node-version: [18.x]

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: 'npm'

      - name: Install dependencies
        run: |
          npm install --prefer-offline --no-audit
          npx playwright install chromium firefox

      - name: Run E2E Tests
        run: npx playwright test
        env:
          CI: true
          BASE_URL: ${{ secrets.STAGING_URL || 'http://localhost:8000' }}

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v3
        with:
          name: playwright-report
          path: test-results/
          retention-days: 30

      - name: Publish test report
        if: always()
        uses: daun/playwright-report-action@v3
        with:
          report-path: test-results/html

      - name: Comment PR with test results
        if: github.event_name == 'pull_request' && always()
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const resultsFile = './test-results/results.json';

            if (!fs.existsSync(resultsFile)) {
              return;
            }

            const results = JSON.parse(fs.readFileSync(resultsFile, 'utf8'));
            const totalTests = results.stats?.expected || 0;
            const passedTests = results.stats?.expected - (results.stats?.unexpected || 0) || 0;

            const comment = `## 🧪 E2E Test Results

- Total Tests: ${totalTests}
- Passed: ${passedTests}
- Failed: ${results.stats?.unexpected || 0}
- Skipped: ${results.stats?.skipped || 0}

[📊 Full Report](https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }})`;

            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: comment
            });
