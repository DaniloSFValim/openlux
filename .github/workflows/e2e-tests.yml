name: E2E Tests (Playwright)

on:
  push:
    branches: [ main, develop, feature/*, claude/* ]
  pull_request:
    branches: [ main, develop ]
  schedule:
    - cron: '0 6 * * *'  # 06:00 UTC daily

jobs:
  test:
    timeout-minutes: 30
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
      issues: write
    strategy:
      fail-fast: false
      matrix:
        node-version: [18.x]

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: 'npm'

      - name: Install dependencies
        run: npm install --prefer-offline --no-audit || npm install

      - name: Install Playwright browsers
        run: npx playwright install chromium firefox --with-deps

      - name: Start local server
        run: npx http-server -p 8000 -c-1 &
        continue-on-error: true

      - name: Wait for server
        run: |
          sleep 2
          curl http://localhost:8000 || echo "Server may not be ready"
        continue-on-error: true

      - name: Run E2E Tests
        run: npx playwright test || true
        env:
          CI: true
          BASE_URL: 'http://localhost:8000'

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: |
            test-results/
            playwright-report/
          retention-days: 30

      - name: Comment PR with test results
        if: github.event_name == 'pull_request' && always()
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const resultsFile = './test-results/results.json';

            if (!fs.existsSync(resultsFile)) {
              return;
            }

            const results = JSON.parse(fs.readFileSync(resultsFile, 'utf8'));
            const totalTests = results.stats?.expected || 0;
            const passedTests = results.stats?.expected - (results.stats?.unexpected || 0) || 0;

            const comment = [
              '## 🧪 E2E Test Results',
              '',
              `- Total Tests: ${totalTests}`,
              `- Passed: ${passedTests}`,
              `- Failed: ${results.stats?.unexpected || 0}`,
              `- Skipped: ${results.stats?.skipped || 0}`,
              '',
              '[📊 Full Report](https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }})'
            ].join('\n');

            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: comment
            });
