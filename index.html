<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1"/>
<title>Iluminação Pública · Niterói · SECONSER</title>
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="https://cdn.tailwindcss.com"></script>
<style>
  html,body,#map{height:100%;margin:0}
  body{background:#0b0f14;color:#e5e7eb;font-family:ui-sans-serif,system-ui,-apple-system,Segoe UI,Roboto,sans-serif}
  .leaflet-container{background:#0b0f14}
  .panel{background:#0f151c;border:1px solid #1f2a37}
  .chip{background:#111a24;border:1px solid #1f2a37}
  .cluster-label{color:#0b0f14;font-weight:700;font-size:11px;text-align:center;line-height:1}
  input,select,textarea{background:#0b1017;border:1px solid #24303d;color:#e5e7eb;border-radius:6px;padding:6px 8px;font-size:13px;width:100%}
  input:focus,select:focus,textarea:focus{outline:none;border-color:#3b82f6}
  button{cursor:pointer}
  .btn{border:1px solid #24303d;background:#111a24;border-radius:6px;padding:6px 12px;font-size:13px;color:#e5e7eb}
  .btn:hover{border-color:#3b82f6}
  .btn-accent{background:#1d4ed8;border-color:#1d4ed8;color:#fff}
  .btn-accent:hover{background:#2563eb}
  ::-webkit-scrollbar{width:8px;height:8px}::-webkit-scrollbar-thumb{background:#24303d;border-radius:4px}
  .badge{font-size:11px;padding:2px 8px;border-radius:999px;font-weight:600}
  table{font-size:12.5px}th,td{padding:6px 8px;text-align:left;border-bottom:1px solid #1a232e}
  th{color:#9ca3af;font-weight:600;position:sticky;top:0;background:#0f151c}
  tr:hover td{background:#111a24}
</style>
</head>
<body>
<div id="map"></div>

<!-- Top bar -->
<div class="panel" style="position:absolute;top:10px;left:10px;right:10px;z-index:1000;border-radius:10px;display:flex;align-items:center;gap:12px;padding:8px 12px;flex-wrap:wrap">
  <div style="font-weight:700;letter-spacing:.3px">Iluminação Pública · <span style="color:#93c5fd">Niterói</span> <span style="color:#6b7280;font-weight:400">· SECONSER</span></div>
  <div id="chips" style="display:flex;gap:8px;flex-wrap:wrap;flex:1"></div>
  <select id="fBairro" style="width:180px"><option value="">Todos os bairros</option></select>
  <button class="btn" id="btnTabela">Tabela</button>
  <button class="btn" id="btnStats">Passivo por bairro</button>
  <button class="btn btn-accent" id="btnNovo" style="display:none">+ Ponto</button>
  <button class="btn" id="btnLogin">Entrar</button>
</div>

<!-- Legend -->
<div class="panel" style="position:absolute;bottom:14px;left:10px;z-index:1000;border-radius:10px;padding:8px 10px;font-size:12px">
  <div style="display:flex;align-items:center;gap:6px;margin-bottom:3px"><span style="width:10px;height:10px;border-radius:50%;background:#22c55e;display:inline-block"></span> LED</div>
  <div style="display:flex;align-items:center;gap:6px;margin-bottom:3px"><span style="width:10px;height:10px;border-radius:50%;background:#f59e0b;display:inline-block"></span> Pendente de troca</div>
  <div style="display:flex;align-items:center;gap:6px"><span style="width:10px;height:10px;border-radius:50%;background:#6b7280;display:inline-block"></span> Sem lâmpada</div>
  <div id="modeHint" style="color:#6b7280;margin-top:5px"></div>
</div>

<!-- Detail panel -->
<div id="detail" class="panel" style="position:absolute;top:64px;right:10px;width:300px;z-index:1000;border-radius:10px;padding:12px;display:none;max-height:calc(100% - 90px);overflow:auto"></div>

<!-- Stats (por bairro) -->
<div id="stats" class="panel" style="position:absolute;top:64px;left:10px;width:340px;z-index:1000;border-radius:10px;padding:12px;display:none;max-height:calc(100% - 90px);overflow:auto"></div>

<!-- Table modal -->
<div id="tableModal" style="position:absolute;inset:0;z-index:1100;background:rgba(0,0,0,.55);display:none;align-items:center;justify-content:center">
  <div class="panel" style="width:min(1050px,95vw);height:min(80vh,760px);border-radius:12px;display:flex;flex-direction:column;overflow:hidden">
    <div style="display:flex;gap:8px;align-items:center;padding:10px 12px;border-bottom:1px solid #1f2a37;flex-wrap:wrap">
      <b>Registro de luminárias</b>
      <input id="tSearch" placeholder="Endereço ou patrimônio…" style="width:220px"/>
      <select id="tBairro" style="width:160px"><option value="">Bairro: todos</option></select>
      <select id="tStatus" style="width:150px">
        <option value="">Estado: todos</option>
        <option value="led">LED</option>
        <option value="pendente">Pendente</option>
      </select>
      <span id="tCount" style="color:#9ca3af;font-size:12px;margin-left:auto"></span>
      <button class="btn" id="tClose">Fechar</button>
    </div>
    <div style="flex:1;overflow:auto"><table style="width:100%;border-collapse:collapse">
      <thead><tr><th>Patrimônio</th><th>Endereço</th><th>Bairro</th><th>Tipo</th><th>Pot.</th><th>Estado</th><th>Origem mod.</th><th></th></tr></thead>
      <tbody id="tBody"></tbody>
    </table></div>
    <div style="display:flex;gap:8px;align-items:center;justify-content:center;padding:8px;border-top:1px solid #1f2a37">
      <button class="btn" id="tPrev">‹ Anterior</button>
      <span id="tPage" style="font-size:12px;color:#9ca3af"></span>
      <button class="btn" id="tNext">Próxima ›</button>
    </div>
  </div>
</div>

<!-- Login modal -->
<div id="loginModal" style="position:absolute;inset:0;z-index:1200;background:rgba(0,0,0,.55);display:none;align-items:center;justify-content:center">
  <div class="panel" style="width:320px;border-radius:12px;padding:18px">
    <b>Entrar para editar</b>
    <div style="margin-top:12px;display:flex;flex-direction:column;gap:8px">
      <input id="liEmail" type="email" placeholder="E-mail"/>
      <input id="liPass" type="password" placeholder="Senha"/>
      <div id="liErr" style="color:#f87171;font-size:12px;display:none"></div>
      <div style="display:flex;gap:8px;justify-content:flex-end;margin-top:4px">
        <button class="btn" id="liCancel">Cancelar</button>
        <button class="btn btn-accent" id="liSubmit">Entrar</button>
      </div>
    </div>
  </div>
</div>

<script>
const URL_SB = "https://lrnmydrwzxxajylsmoih.supabase.co";
const ANON = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Imxybm15ZHJ3enh4YWp5bHNtb2loIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODI5MjcxNDcsImV4cCI6MjA5ODUwMzE0N30.nNukQrAINdBCcBNwVF7x1HfYgz1vg2QPyvWOfYGAHnM";
const sb = window.supabase.createClient(URL_SB, ANON);

const state = { user:null, bairro:"", layer:null, mode:"", tPage:0, tSize:50, addMode:false };
const TIPOS = ["led","vapor_sodio","metalico","vapor_mercurio","fluorescente","sem_lampada","desconhecido"];
const STATUS = ["led_instalado","pendente_troca","a_verificar"];

const map = L.map('map',{zoomControl:true,attributionControl:false}).setView([-22.905,-43.075],12);
L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png',{maxZoom:19,subdomains:'abcd'}).addTo(map);
state.layer = L.layerGroup().addTo(map);

const POINT_ZOOM = 16;
function gridForZoom(z){ return Math.max(0.0015, 0.05/Math.pow(2, z-11)); }
function colorFor(p){ if(p.modernizado_led) return '#22c55e'; if(p.tipo_lampada==='sem_lampada') return '#6b7280'; return '#f59e0b'; }
function mix(pct){ // 0..1 amber->green
  const a=[245,158,11], b=[34,197,94]; return `rgb(${a.map((x,i)=>Math.round(x+(b[i]-x)*pct)).join(',')})`;
}

async function refresh(){
  const b = map.getBounds(), z = map.getZoom();
  const args = { min_lng:b.getWest(), min_lat:b.getSouth(), max_lng:b.getEast(), max_lat:b.getNorth(), p_bairro: state.bairro||null };
  state.layer.clearLayers();
  if(z >= POINT_ZOOM){
    state.mode="pontos";
    const { data, error } = await sb.rpc('ip_pontos_bbox', {...args, limite:4000});
    if(error){ console.error(error); return; }
    (data||[]).forEach(p=>{
      L.circleMarker([p.lat,p.lon],{radius:5,weight:1,color:'#0b0f14',fillColor:colorFor(p),fillOpacity:.95})
        .on('click',()=>openDetail(p)).addTo(state.layer);
    });
    document.getElementById('modeHint').textContent = `${(data||[]).length} pontos nesta área`;
  } else {
    state.mode="clusters";
    const { data, error } = await sb.rpc('ip_clusters_grid', {...args, grid_deg:gridForZoom(z)});
    if(error){ console.error(error); return; }
    (data||[]).forEach(c=>{
      const r = Math.min(30, 8+Math.sqrt(c.n)*1.4), pct=c.led/c.n;
      const m = L.circleMarker([c.lat,c.lon],{radius:r,weight:1.5,color:'#0b0f14',fillColor:mix(pct),fillOpacity:.82}).addTo(state.layer);
      L.marker([c.lat,c.lon],{interactive:false,icon:L.divIcon({className:'',html:`<div class="cluster-label" style="width:${r*2}px;transform:translate(-50%,-50%)">${c.n}</div>`})}).addTo(state.layer);
      m.on('click',()=>map.setView([c.lat,c.lon], Math.min(POINT_ZOOM, z+2)));
    });
    document.getElementById('modeHint').textContent = 'Aproxime para ver luminárias individuais';
  }
}
map.on('moveend', refresh);

// ---------- Detail ----------
function fld(label,val){ return `<div style="display:flex;justify-content:space-between;gap:10px;padding:3px 0;border-bottom:1px solid #161f29"><span style="color:#9ca3af">${label}</span><span style="text-align:right">${val??'—'}</span></div>`; }
function openDetail(p){
  state.current = p;
  const d = document.getElementById('detail'); d.style.display='block';
  const badge = p.modernizado_led ? `<span class="badge" style="background:#0d3d24;color:#4ade80">LED</span>` : `<span class="badge" style="background:#3d2f0d;color:#fbbf24">Pendente</span>`;
  const origem = p.fonte_modernizacao==='censo_enel'?'Censo ENEL':p.fonte_modernizacao==='seconser_pos_censo'?'SECONSER (pós-censo)':p.fonte_modernizacao==='campo'?'Campo':'—';
  d.innerHTML = `
    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:8px">
      <b style="font-size:13px">${p.numero_patrimonio||'Luminária'}</b> ${badge}
    </div>
    ${fld('Endereço', p.endereco)}
    ${fld('Bairro', p.bairro_nome)}
    ${fld('Tipo atual', p.tipo_lampada)}
    ${fld('Potência', p.potencia_w? p.potencia_w+' W':null)}
    ${fld('Estado', p.status)}
    ${fld('Origem modernização', origem)}
    ${fld('Tipo no censo', p.censo_tipo_original)}
    ${fld('Fonte do ponto', p.fonte)}
    ${p.flag_revisao_censo?`<div style="color:#fbbf24;font-size:11px;margin-top:4px">⚑ marcado para revisão (linha idêntica no censo)</div>`:''}
    ${p.observacoes?`<div style="color:#9ca3af;font-size:11px;margin-top:6px">${p.observacoes}</div>`:''}
    <div style="margin-top:10px;display:flex;gap:8px">
      ${state.user?`<button class="btn btn-accent" style="flex:1" onclick="window._edit()">Editar</button>`:''}
      <button class="btn" onclick="document.getElementById('detail').style.display='none'">Fechar</button>
    </div>`;
}
window._edit = function(){
  const p = state.current; if(!p) return;
  const d = document.getElementById('detail');
  d.innerHTML = `
    <b style="font-size:13px">Editar · ${p.numero_patrimonio||''}</b>
    <div style="margin-top:8px;display:flex;flex-direction:column;gap:7px">
      <label style="font-size:11px;color:#9ca3af">Tipo<select id="eTipo">${TIPOS.map(t=>`<option ${t===p.tipo_lampada?'selected':''}>${t}</option>`).join('')}</select></label>
      <label style="font-size:11px;color:#9ca3af">Potência (W)<input id="ePot" type="number" value="${p.potencia_w||''}"/></label>
      <label style="font-size:11px;color:#9ca3af">Estado<select id="eStatus">${STATUS.map(s=>`<option ${s===p.status?'selected':''}>${s}</option>`).join('')}</select></label>
      <label style="font-size:12px;display:flex;gap:8px;align-items:center;color:#e5e7eb"><input type="checkbox" id="eMod" ${p.modernizado_led?'checked':''} style="width:auto"/> Modernizado para LED</label>
      <label style="font-size:11px;color:#9ca3af">Observações<textarea id="eObs" rows="2">${p.observacoes||''}</textarea></label>
      <div id="eErr" style="color:#f87171;font-size:11px;display:none"></div>
      <div style="display:flex;gap:8px"><button class="btn btn-accent" style="flex:1" id="eSave">Salvar</button><button class="btn" onclick="window._reopen()">Cancelar</button></div>
    </div>`;
  document.getElementById('eSave').onclick = async ()=>{
    const payload = { p_id:p.id, p_tipo:document.getElementById('eTipo').value,
      p_potencia: parseInt(document.getElementById('ePot').value)||null,
      p_status: document.getElementById('eStatus').value,
      p_modernizado: document.getElementById('eMod').checked,
      p_obs: document.getElementById('eObs').value||null };
    const { error } = await sb.rpc('ip_atualizar_ponto', payload);
    if(error){ const e=document.getElementById('eErr'); e.style.display='block'; e.textContent=error.message; return; }
    document.getElementById('detail').style.display='none'; refresh(); loadStatsChips();
  };
};
window._reopen = ()=>openDetail(state.current);

// ---------- Add point ----------
document.getElementById('btnNovo').onclick = ()=>{
  state.addMode = !state.addMode;
  document.getElementById('btnNovo').textContent = state.addMode ? '⨯ Cancelar' : '+ Ponto';
  map.getContainer().style.cursor = state.addMode ? 'crosshair' : '';
};
map.on('click', e=>{
  if(!state.addMode || !state.user) return;
  const d = document.getElementById('detail'); d.style.display='block';
  d.innerHTML = `
    <b style="font-size:13px">Novo ponto</b>
    <div style="font-size:11px;color:#9ca3af;margin:4px 0">${e.latlng.lat.toFixed(6)}, ${e.latlng.lng.toFixed(6)}</div>
    <div style="display:flex;flex-direction:column;gap:7px">
      <input id="nPatr" placeholder="Nº patrimônio"/>
      <input id="nEnd" placeholder="Endereço"/>
      <select id="nTipo">${TIPOS.map(t=>`<option>${t}</option>`).join('')}</select>
      <input id="nPot" type="number" placeholder="Potência (W)"/>
      <select id="nStatus">${STATUS.map(s=>`<option>${s}</option>`).join('')}</select>
      <label style="font-size:12px;display:flex;gap:8px;align-items:center"><input type="checkbox" id="nMod" style="width:auto"/> LED</label>
      <div id="nErr" style="color:#f87171;font-size:11px;display:none"></div>
      <button class="btn btn-accent" id="nSave">Cadastrar</button>
    </div>`;
  document.getElementById('nSave').onclick = async ()=>{
    const { error } = await sb.rpc('ip_inserir_ponto', {
      p_lat:e.latlng.lat, p_lng:e.latlng.lng, p_tipo:document.getElementById('nTipo').value,
      p_potencia: parseInt(document.getElementById('nPot').value)||null,
      p_status: document.getElementById('nStatus').value, p_modernizado: document.getElementById('nMod').checked,
      p_endereco: document.getElementById('nEnd').value||null, p_patrimonio: document.getElementById('nPatr').value||null,
      p_obs:'cadastro manual' });
    if(error){ const el=document.getElementById('nErr'); el.style.display='block'; el.textContent=error.message; return; }
    d.style.display='none'; state.addMode=false; document.getElementById('btnNovo').textContent='+ Ponto';
    map.getContainer().style.cursor=''; refresh(); loadStatsChips();
  };
});

// ---------- Stats chips + bairro panel ----------
async function loadStatsChips(){
  const { data } = await sb.rpc('ip_estatisticas', { p_bairro: state.bairro||null });
  if(!data) return;
  const c = document.getElementById('chips');
  c.innerHTML = [
    ['Luminárias', data.total.toLocaleString('pt-BR')],
    ['LED', `${data.led.toLocaleString('pt-BR')} · ${data.pct_led}%`],
    ['— censo', data.led_censo.toLocaleString('pt-BR')],
    ['— SECONSER', data.led_seconser.toLocaleString('pt-BR')],
    ['Pendentes', data.pendente.toLocaleString('pt-BR')],
    ['Pot. LED', `${data.potencia_kw} kW`],
  ].map(([k,v])=>`<span class="chip" style="border-radius:8px;padding:4px 9px;font-size:12px"><span style="color:#9ca3af">${k}</span> <b>${v}</b></span>`).join('');
}
async function loadBairroPanel(){
  const { data } = await sb.rpc('ip_por_bairro');
  const s = document.getElementById('stats');
  const rows = (data||[]).map(b=>`<tr style="cursor:pointer" onclick="window._zoomBairro('${b.bairro_nome.replace(/'/g,"\\'")}')">
    <td>${b.bairro_nome}</td><td style="text-align:right">${b.total}</td>
    <td style="text-align:right;color:#4ade80">${b.led}</td>
    <td style="text-align:right;color:#fbbf24">${b.pendente}</td>
    <td style="text-align:right">${b.pct_led}%</td></tr>`).join('');
  s.innerHTML = `<div style="display:flex;justify-content:space-between;margin-bottom:8px"><b>Passivo de troca por bairro</b><button class="btn" onclick="document.getElementById('stats').style.display='none'">✕</button></div>
    <table style="width:100%;border-collapse:collapse"><thead><tr><th>Bairro</th><th style="text-align:right">Total</th><th style="text-align:right">LED</th><th style="text-align:right">Pend.</th><th style="text-align:right">%</th></tr></thead><tbody>${rows}</tbody></table>`;
}
window._zoomBairro = (b)=>{ document.getElementById('fBairro').value=b; state.bairro=b; loadStatsChips(); refresh(); };

// bairro filter dropdown
async function loadBairroOptions(){
  const { data } = await sb.rpc('ip_por_bairro');
  const names = (data||[]).map(b=>b.bairro_nome).sort((a,b)=>a.localeCompare(b,'pt-BR'));
  const f=document.getElementById('fBairro'), t=document.getElementById('tBairro');
  names.forEach(n=>{ f.insertAdjacentHTML('beforeend',`<option>${n}</option>`); t.insertAdjacentHTML('beforeend',`<option>${n}</option>`); });
}
document.getElementById('fBairro').onchange = e=>{ state.bairro=e.target.value; loadStatsChips(); refresh(); };
document.getElementById('btnStats').onclick = ()=>{ const s=document.getElementById('stats'); if(s.style.display==='block'){s.style.display='none';} else {s.style.display='block'; loadBairroPanel();} };

// ---------- Table ----------
async function loadTable(){
  let q = sb.from('pontos_luminaria').select('id,numero_patrimonio,endereco,bairro_nome,tipo_lampada,potencia_w,modernizado_led,fonte_modernizacao,status,observacoes',{count:'exact'});
  const s=document.getElementById('tSearch').value.trim();
  const bb=document.getElementById('tBairro').value, st=document.getElementById('tStatus').value;
  if(s) q=q.or(`endereco.ilike.%${s}%,numero_patrimonio.ilike.%${s}%`);
  if(bb) q=q.eq('bairro_nome',bb);
  if(st==='led') q=q.eq('modernizado_led',true);
  if(st==='pendente') q=q.eq('modernizado_led',false);
  const from=state.tPage*state.tSize;
  q=q.order('bairro_nome').range(from, from+state.tSize-1);
  const { data, count, error } = await q;
  if(error){ console.error(error); return; }
  document.getElementById('tCount').textContent = `${(count||0).toLocaleString('pt-BR')} registros`;
  document.getElementById('tPage').textContent = `Página ${state.tPage+1} de ${Math.max(1,Math.ceil((count||0)/state.tSize))}`;
  state.tCache = {};
  (data||[]).forEach(p=>state.tCache[p.id]=p);
  document.getElementById('tBody').innerHTML = (data||[]).map(p=>{
    const origem = p.fonte_modernizacao==='censo_enel'?'censo':p.fonte_modernizacao==='seconser_pos_censo'?'SECONSER':p.fonte_modernizacao==='campo'?'campo':'—';
    const est = p.modernizado_led?`<span class="badge" style="background:#0d3d24;color:#4ade80">LED</span>`:`<span class="badge" style="background:#3d2f0d;color:#fbbf24">Pend.</span>`;
    return `<tr><td>${p.numero_patrimonio||'—'}</td><td>${p.endereco||'—'}</td><td>${p.bairro_nome||'—'}</td><td>${p.tipo_lampada}</td><td>${p.potencia_w||'—'}</td><td>${est}</td><td style="color:#9ca3af">${origem}</td>
      <td>${state.user?`<button class="btn" style="padding:2px 8px" onclick="window._editId('${p.id}')">editar</button>`:''}</td></tr>`;
  }).join('');
}
window._editId = (id)=>{ const p=state.tCache[id]; if(!p) return; state.current=p; document.getElementById('tableModal').style.display='none'; document.getElementById('detail').style.display='block'; window._edit(); };
document.getElementById('btnTabela').onclick = ()=>{ state.tPage=0; document.getElementById('tableModal').style.display='flex'; loadTable(); };
document.getElementById('tClose').onclick = ()=>document.getElementById('tableModal').style.display='none';
document.getElementById('tPrev').onclick = ()=>{ if(state.tPage>0){state.tPage--;loadTable();} };
document.getElementById('tNext').onclick = ()=>{ state.tPage++; loadTable(); };
['tSearch','tBairro','tStatus'].forEach(id=>document.getElementById(id).addEventListener('input',()=>{state.tPage=0;loadTable();}));

// ---------- Auth ----------
function setUser(u){
  state.user=u;
  document.getElementById('btnLogin').textContent = u ? 'Sair' : 'Entrar';
  document.getElementById('btnNovo').style.display = u ? 'inline-block' : 'none';
}
document.getElementById('btnLogin').onclick = async ()=>{
  if(state.user){ await sb.auth.signOut(); setUser(null); return; }
  document.getElementById('loginModal').style.display='flex';
};
document.getElementById('liCancel').onclick = ()=>document.getElementById('loginModal').style.display='none';
document.getElementById('liSubmit').onclick = async ()=>{
  const email=document.getElementById('liEmail').value, password=document.getElementById('liPass').value;
  const { data, error } = await sb.auth.signInWithPassword({email,password});
  const err=document.getElementById('liErr');
  if(error){ err.style.display='block'; err.textContent='Falha no login: '+error.message; return; }
  err.style.display='none'; document.getElementById('loginModal').style.display='none'; setUser(data.user);
};
sb.auth.getSession().then(({data})=>setUser(data.session?.user||null));

// ---------- init ----------
loadBairroOptions(); loadStatsChips(); refresh();
</script>
</body>
</html>
