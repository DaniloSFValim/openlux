# O site publica APENAS o index.html (copiado para dist/ no build).
# Antes era `publish = "."`, o que servia publicamente o repositório inteiro:
# supabase/migrations/*.sql (schema do banco), docs internos, versões POC
# antigas do app, coleção Postman etc. — divulgação desnecessária da
# superfície de ataque. Ver auditoria de 2026-07-09, item C4.
[build]
  publish = "dist"
  command = "mkdir -p dist && cp index.html design-tokens.css phase2-header-redesign.css phase3-admin-console-redesign.css phase4-forms-tables-redesign.css phase5-polish-mobile.css _headers dist/ 2>/dev/null || cp index.html design-tokens.css phase2-header-redesign.css phase3-admin-console-redesign.css phase4-forms-tables-redesign.css phase5-polish-mobile.css dist/"

[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "SAMEORIGIN"
    X-Content-Type-Options = "nosniff"

[[headers]]
  for = "*.css"
  [headers.values]
    Content-Type = "text/css; charset=utf-8"
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "*.js"
  [headers.values]
    Content-Type = "application/javascript; charset=utf-8"
    Cache-Control = "public, max-age=31536000, immutable"
